<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="library.js" defer></script>
    <title>Odin Library</title>
  </head>
  <body>
    <div class="header">
      <h1>Library</h1>
    </div>

    <div class="unread-book-container">
      <div class="unread-book-header">
        <h2>Unread Books</h2>
        <button class="add-book-btn">
          <img class="plus-sign" src="images/plus-sign.svg" alt="plus-sign">
          Add
        </button>
      </div>

      <div class="unread-book-cards"></div>
    </div>

    <!-- <hr> -->

    <div class="read-book-container">
      <h2>Read Books</h2>
      <!--Continue by working on read book container by using the same logic as 
      unread book container-->
      <div class="read-book-cards"></div>
    </div>

    <dialog id="form-dialog" closedby="closerequest">
      <div class="dialog-container">
        <div class="dialog-title">
          <h2>New <br>Book</h2>
        </div>
        <form class="add-book-form">
          <div>
            <label for="title">Book's Title</label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="e.g. Harry Potter"
              required
            />
          </div>
          <div>
            <label for="author">Book's Author</label>
            <input
              type="text"
              id="author"
              name="author"
              placeholder="e.g. J.K. Rowling"
              required
            />
          </div>
          <div>
            <label for="page-number">Number of Pages</label>
            <input
              type="text"
              id="pages"
              name="page-number"
              placeholder="e.g. 100"
              required
            />
          </div>
          <div class="status-container">
            <label for="status">Read?</label>
            <input type="checkbox" id="status" name="status" />
          </div>
          <div class="form-button-containers">
            <button class="cancel-btn" value="cancel" formmethod="dialog">
              Cancel
            </button>
            <button class="accept-btn" value="default">Submit</button>
          </div>
        </form>
      </div>
      
    </dialog>
  </body>
</html>
